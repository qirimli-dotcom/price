let currentBrand = Object.keys(PRODUCTS)[0];
let cart = {};
const tabsEl = document.getElementById("tabs");
Object.keys(PRODUCTS).forEach(b => {
  const btn = document.createElement("button");
  btn.className = "tab" + (b === currentBrand ? " active" : "");
  btn.textContent = b;
  btn.onclick = () => { currentBrand = b; document.querySelectorAll(".tab").forEach(t => t.classList.remove("active")); btn.classList.add("active"); renderTable(); };

});
function renderTable() {
  const search = document.getElementById("search").value.toLowerCase();
  const tbody = document.getElementById("product-body");
  tbody.innerHTML = "";
  const items = (PRODUCTS[currentBrand] || []).filter(p => p.name.toLowerCase().includes(search) || p.art.toLowerCase().includes(search));
  if (!items.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:32px;">Ничего не найдено</td></tr>'; return; }
  items.forEach((p, i) => {
    const key = currentBrand + "_" + i;
    const added = !!cart[key];
    const tr = document.createElement("tr");
    tr.innerHTML = '<td class="art">' + p.art + '</td><td>' + p.name + '</td><td><span class="stars">' + p.stars + '</span></td><td class="price">' + p.price.toLocaleString("ru") + ' ₽</td><td><input class="qty-input" type="number" min="1" value="1" id="qty_' + key + '" /></td><td><button class="add-btn ' + (added ? 'added' : '') + '" id="btn_' + key + '" onclick="addToCart('' + key + '','' + p.art.replace(/'/g,"\'") + '','' + p.name.replace(/'/g,"\'") + '',' + p.price + ')">' + (added ? '✓ Добавлено' : 'В корзину') + '</button></td>';
    tbody.appendChild(tr);
  });
}
function addToCart(key, art, name, price) {
  const qty = parseInt(document.getElementById("qty_" + key).value) || 1;
  cart[key] = { art, name, price, qty };
  const btn = document.getElementById("btn_" + key);
  if (btn) { btn.className = "add-btn added"; btn.textContent = "✓ Добавлено"; }
  updateCartUI();
}
function removeFromCart(key) { delete cart[key]; updateCartUI(); renderCartItems(); renderTable(); }
function updateCartUI() { const c = Object.keys(cart).length; document.getElementById("cart-badge").textContent = c; document.getElementById("cart-total-count").textContent = c; }
function renderCartItems() {
  const el = document.getElementById("cart-items");
  const items = Object.entries(cart);
  if (!items.length) { el.innerHTML = '<p class="cart-empty">Корзина пуста</p>'; return; }
  el.innerHTML = items.map(([key, i]) => '<div class="cart-item"><div style="flex:1"><div class="cart-item-name">' + i.name + '</div><div class="cart-item-art">' + i.art + '</div></div><div style="text-align:right;flex-shrink:0"><div class="cart-item-price">' + (i.price * i.qty).toLocaleString("ru") + ' ₽</div><div class="cart-item-qty">' + i.qty + ' шт</div></div><button class="cart-remove" onclick="removeFromCart('' + key + '')">×</button></div>').join("");
}
function toggleCart() { const p = document.getElementById("cart-panel"); const o = document.getElementById("cart-overlay"); if (!p.classList.contains("open")) renderCartItems(); p.classList.toggle("open"); o.classList.toggle("open"); }
function submitOrder() {
  const name = document.getElementById("client-name").value.trim();
  const contact = document.getElementById("client-contact").value.trim();
  const comment = document.getElementById("client-comment").value.trim();
  const items = Object.values(cart);
  if (!name) { alert("Укажите ваше имя"); return; }
  if (!contact) { alert("Укажите телефон или Telegram"); return; }
  if (!items.length) { alert("Корзина пуста"); return; }
  let body = "Новая заявка с прайса IT-Trade\n\nКлиент: " + name + "\nКонтакт: " + contact + (comment ? "\nКомментарий: " + comment : "") + "\n\nПозиции:\n";
  items.forEach(i => { body += "- " + i.art + " | " + i.name + " | " + i.qty + " шт | " + (i.price * i.qty).toLocaleString("ru") + " ₽\n"; });
  window.location.href = "mailto:info@it-trade.com.ru?subject=" + encodeURIComponent("Заявка с прайса от " + name) + "&body=" + encodeURIComponent(body);
  document.getElementById("cart-panel").classList.remove("open");
  document.getElementById("cart-overlay").classList.remove("open");
  document.getElementById("success-modal").classList.add("open");
  cart = {}; updateCartUI();
}
function closeSuccess() { document.getElementById("success-modal").classList.remove("open"); renderTable(); }
renderTable();
</script>
</body>
</html>
