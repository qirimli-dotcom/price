<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прайс IT-Trade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>emailjs.init("9ARKPvGTU2pExxVWF");</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; color: #1a1a1a; }
header { background: #171717; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 12px; }
header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; }
.updated { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.cart-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; }
.badge { background: #fff; color: #171717; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 8px 20px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; color: #555; white-space: nowrap; }
.tab.active { background: #171717; color: #fff; border-color: #171717; }
.search-box { margin-bottom: 16px; }
.search-box input { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #ececec; }
th { background: #fff; color: #1a1a1a; padding: 12px 14px; text-align: left; font-size: 13px; font-weight: 600; border-bottom: 2px solid #171717; }
td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f7f7f7; }
.stars { color: #1a1a1a; }
.price { font-weight: 700; color: #1a1a1a; font-family: 'IBM Plex Mono', monospace; }
.qty-input { width: 52px; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; text-align: center; }
.add-btn { background: #171717; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.add-btn.added { background: #fff; color: #171717; border: 1px solid #171717; }
.art { color: #888; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
.photo-cell { width: 68px; }
.thumb { width: 60px; height: 60px; object-fit: contain; border-radius: 6px; border: 1px solid #ececec; background: #fff; display: block; -webkit-user-select: none; user-select: none; }
.thumb.has-photo { cursor: pointer; }
.thumb.has-photo:hover { border-color: #171717; }
.photo-lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 400; align-items: center; justify-content: center; cursor: zoom-out; }
.photo-lightbox.open { display: flex; }
.photo-lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; background: #fff; }
.thumb-empty { background: #f5f5f5; }
.cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; }
.cart-overlay.open { display: block; }
.cart-panel { position: fixed; top: 0; right: -420px; width: 420px; height: 100%; background: #fff; z-index: 201; display: flex; flex-direction: column; transition: right 0.25s; box-shadow: -4px 0 20px rgba(0,0,0,0.1); }
.cart-panel.open { right: 0; }
.cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
.cart-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; }
.cart-items { flex: 1; overflow-y: auto; padding: 16px 20px; }
.cart-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #f0f0f0; gap: 12px; }
.cart-item-name { font-size: 13px; flex: 1; }
.cart-item-art { font-size: 11px; color: #999; margin-top: 2px; }
.cart-item-price { font-size: 13px; font-weight: 700; color: #1a1a1a; font-family: 'IBM Plex Mono', monospace; }
.cart-item-qty { font-size: 12px; color: #888; }
.cart-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; }
.cart-empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }
.cart-footer { padding: 20px; border-top: 1px solid #eee; }
.cart-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.cart-footer input, .cart-footer textarea { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; margin-bottom: 10px; font-family: inherit; outline: none; }
.cart-footer textarea { min-height: 60px; resize: none; }
.submit-btn { width: 100%; background: #171717; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
.success-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fff; border-radius: 12px; padding: 32px; text-align: center; z-index: 300; box-shadow: 0 8px 32px rgba(0,0,0,0.15); max-width: 320px; width: 90%; }
.success-modal.open { display: block; }
.success-modal h3 { font-size: 18px; margin-bottom: 8px; color: #1a1a1a; }
.success-modal p { font-size: 14px; color: #666; margin-bottom: 20px; }
.success-modal button { background: #171717; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; }
@media (max-width: 600px) { .cart-panel { width: 100%; } }

/* ===== Мобильная адаптация ===== */
@media (max-width: 760px) {
  header { padding: 12px 16px; }
  header img { height: 28px !important; }
  header h1 { font-size: 15px; }
  .updated { display: none; }
  .cart-btn { padding: 7px 12px; font-size: 13px; }
  .container { padding: 16px 10px; }
  .tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -10px 16px; padding: 0 10px 4px; }
  .tabs::-webkit-scrollbar { height: 4px; }
  .tab { padding: 7px 14px; font-size: 13px; flex-shrink: 0; }
  .search-box input { font-size: 16px; }

  table { border: none; background: none; }
  thead { display: none; }
  tbody { display: flex; flex-direction: column; gap: 10px; }
  tr {
    display: flex;
    flex-direction: column;
    position: relative;
    background: #fff; border: 1px solid #ececec; border-radius: 10px; padding: 12px 14px;
  }
  td { border: none; padding: 2px 0; font-size: 13px; }
  tr:hover td { background: transparent; }

  td:nth-child(1) { display: none; }
  td:nth-child(2) { position: absolute; right: 30px; bottom: 60px; }
  td:nth-child(2) .thumb { width: 90px; height: 90px; }
  td:nth-child(3) { order: 2; font-size: 11px; padding-right: 100px; }
  td:nth-child(3)::before { content: "Арт: "; color: #aaa; }
  td:nth-child(4) { order: 1; font-size: 14px; font-weight: 500; padding-bottom: 4px; line-height: 1.4; padding-right: 100px; }
  td:nth-child(5) { order: 3; font-size: 13px; padding-right: 100px; }
  td:nth-child(5)::before { content: "Наличие: "; font-size: 11px; color: #aaa; }
  td:nth-child(6) { order: 4; font-size: 17px; padding: 6px 0; padding-right: 100px; }
  td:nth-child(6)::before { content: "Цена: "; font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; font-size: 11px; color: #aaa; }
  td:nth-child(7) { order: 5; display: flex; align-items: center; gap: 8px; }
  td:nth-child(7)::before { content: "Кол-во: "; font-size: 11px; color: #aaa; }
  td:nth-child(8) { order: 6; margin-top: 6px; }
  td:nth-child(8) .add-btn { width: 100%; padding: 10px; font-size: 13px; }

  .success-modal { padding: 24px; }
}
</style>
</head>

var brand = Object.keys(PRODUCTS)[0] || "";
var cart = {};
function fmtPrice(n) { return n.toFixed(2).replace(".", ","); }
function openLightbox(src) {
  document.getElementById("photo-lightbox-img").src = src;
  document.getElementById("photo-lightbox").classList.add("open");
}
function closeLightbox() {
  document.getElementById("photo-lightbox").classList.remove("open");
}

var tabsEl = document.getElementById("tabs");
Object.keys(PRODUCTS).forEach(function(b) {
  var btn = document.createElement("button");
  btn.className = "tab" + (b === brand ? " active" : "");
  btn.textContent = b;
  btn.addEventListener("click", function() {
    brand = b;
    document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
    btn.classList.add("active");
    renderTable();
  });
  tabsEl.appendChild(btn);
});

function renderTable() {
  var search = document.getElementById("search").value.toLowerCase();
  var tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  var items = (PRODUCTS[brand] || []).filter(function(p){
    return p.name.toLowerCase().indexOf(search) >= 0 || String(p.art).toLowerCase().indexOf(search) >= 0;
  });
  if (!items.length) {
    tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;color:#aaa;padding:32px'>Ничего не найдено</td></tr>";
    return;
  }
  items.forEach(function(p, i) {
    var key = brand + "_" + PRODUCTS[brand].indexOf(p);
    var tr = document.createElement("tr");
    var tdNum = document.createElement("td"); tdNum.style.color="#aaa"; tdNum.style.fontSize="11px"; tdNum.textContent = i+1; tr.appendChild(tdNum);
    var tdPhoto = document.createElement("td"); tdPhoto.className = "photo-cell";
    var src = (typeof IMAGES !== "undefined" && IMAGES[p.name.trim()]) ? IMAGES[p.name.trim()] : null;
    if (src) {
      var img = document.createElement("img"); img.className = "thumb has-photo"; img.src = src; img.loading = "lazy"; img.alt = "";
      img.addEventListener("click", function(url) { return function() { openLightbox(url); }; }(src));
      tdPhoto.appendChild(img);
    } else {
      var ph = document.createElement("div"); ph.className = "thumb thumb-empty";
      tdPhoto.appendChild(ph);
    }
    tr.appendChild(tdPhoto);
    var td1 = document.createElement("td"); td1.className = "art"; td1.textContent = p.art; tr.appendChild(td1);
    var td2 = document.createElement("td"); td2.textContent = p.name; tr.appendChild(td2);
    var td3 = document.createElement("td"); td3.innerHTML = "<span class='stars'>" + p.stars + "</span>"; tr.appendChild(td3);
    var td4 = document.createElement("td"); td4.className = "price"; td4.textContent = p.noPrice ? "По запросу" : fmtPrice(p.price); tr.appendChild(td4);
    var td5 = document.createElement("td");
    var inp = document.createElement("input");
    inp.className = "qty-input"; inp.type = "number"; inp.min = "1"; inp.value = "1"; inp.id = "qty_" + key;
    td5.appendChild(inp); tr.appendChild(td5);
    var td6 = document.createElement("td");
    var btn = document.createElement("button");
    btn.className = "add-btn" + (cart[key] ? " added" : "");
    btn.id = "btn_" + key;
    btn.textContent = cart[key] ? "Добавлено" : "В корзину";
    (function(k, pp) {
      btn.addEventListener("click", function() {
        var qty = parseInt(document.getElementById("qty_" + k).value) || 1;
        cart[k] = { art: pp.art, name: pp.name, price: pp.price, qty: qty };
        var b2 = document.getElementById("btn_" + k);
        if (b2) { b2.className = "add-btn added"; b2.textContent = "Добавлено"; }
        updateCartUI();
      });
    })(key, p);
    td6.appendChild(btn); tr.appendChild(td6);
    tbody.appendChild(tr);
  });
}

function updateCartUI() {
  var c = Object.keys(cart).length;
  document.getElementById("cart-badge").textContent = c;
  document.getElementById("cart-count").textContent = c;
}

function renderCartItems() {
  var el = document.getElementById("cart-items");
  var items = Object.entries(cart);
  if (!items.length) { el.innerHTML = "<p class='cart-empty'>Корзина пуста</p>"; return; }
  el.innerHTML = items.map(function(e) {
    var k = e[0], it = e[1];
    return "<div class='cart-item'>" +
      "<div style='flex:1'><div class='cart-item-name'>" + it.name + "</div><div class='cart-item-art'>" + it.art + "</div></div>" +
      "<div style='text-align:right;flex-shrink:0'><div class='cart-item-price'>" + fmtPrice(it.price * it.qty) + "</div><div class='cart-item-qty'>" + it.qty + " шт</div></div>" +
      "<button class='cart-remove' data-key='" + k + "'>&#215;</button>" +
      "</div>";
  }).join("");
  el.querySelectorAll(".cart-remove").forEach(function(btn) {
    btn.addEventListener("click", function() { removeFromCart(btn.getAttribute("data-key")); });
  });
}

function removeFromCart(k) { delete cart[k]; updateCartUI(); renderCartItems(); renderTable(); }

function toggleCart() {
  var p = document.getElementById("cart-panel");
  var o = document.getElementById("cart-overlay");
  if (!p.classList.contains("open")) renderCartItems();
  p.classList.toggle("open");
  o.classList.toggle("open");
}

function submitOrder() {
  var name = document.getElementById("c-name").value.trim();
  var contact = document.getElementById("c-contact").value.trim();
  var comment = document.getElementById("c-comment").value.trim();
  var items = Object.values(cart);
  if (!name) { alert("Укажите ваше имя"); return; }
  if (!contact) { alert("Укажите телефон или Telegram"); return; }
  if (!items.length) { alert("Корзина пуста"); return; }
  var order = "";
  items.forEach(function(i) { order += i.art + " | " + i.name + " | " + i.qty + " шт | " + fmtPrice(i.price * i.qty) + " руб.\n"; });
  emailjs.send("service_v8tafrn", "template_yzytwbd", {
    from_name: name,
    contact: contact,
    comment: comment || "-",
    order: order
  }).then(function() {
    document.getElementById("cart-panel").classList.remove("open");
    document.getElementById("cart-overlay").classList.remove("open");
    document.getElementById("success-modal").classList.add("open");
    cart = {}; updateCartUI();
  }, function(error) {
    alert("Ошибка отправки: " + JSON.stringify(error));
  });
}

renderTable();
</script>
