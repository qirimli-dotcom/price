<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прайс IT-Trade</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
  header { background: #1c4587; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 500; }
  .cart-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .cart-btn .badge { background: #ff6b35; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 8px 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; color: #555; transition: all 0.15s; }
  .tab.active { background: #1c4587; color: #fff; border-color: #1c4587; }
  .tab:hover:not(.active) { border-color: #1c4587; color: #1c4587; }
  .search-box { margin-bottom: 16px; }
  .search-box input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  .search-box input:focus { border-color: #1c4587; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  th { background: #1c4587; color: #fff; padding: 12px 14px; text-align: left; font-size: 13px; font-weight: 500; }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .stars { color: #f5a623; font-size: 14px; }
  .price { font-weight: 600; color: #1c4587; white-space: nowrap; }
  .qty-wrap { display: flex; align-items: center; gap: 6px; }
  .qty-input { width: 52px; padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; text-align: center; }
  .add-btn { background: #1c4587; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .add-btn:hover { background: #163d7a; }
  .add-btn.added { background: #27ae60; }
  .art { color: #888; font-size: 12px; }

  /* Корзина */
  .cart-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 200; }
  .cart-overlay.open { display: block; }
  .cart-panel { position: fixed; top: 0; right: -420px; width: 420px; height: 100%; background: #fff; z-index: 201; display: flex; flex-direction: column; transition: right 0.25s; box-shadow: -4px 0 20px rgba(0,0,0,0.15); }
  .cart-panel.open { right: 0; }
  .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
  .cart-header h2 { font-size: 16px; font-weight: 500; }
  .cart-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; line-height: 1; }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .cart-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #f0f0f0; gap: 12px; }
  .cart-item-name { font-size: 13px; flex: 1; }
  .cart-item-art { font-size: 11px; color: #999; margin-top: 2px; }
  .cart-item-right { text-align: right; flex-shrink: 0; }
  .cart-item-price { font-size: 13px; font-weight: 600; color: #1c4587; }
  .cart-item-qty { font-size: 12px; color: #888; }
  .cart-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 0 4px; }
  .cart-remove:hover { color: #e74c3c; }
  .cart-empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }
  .cart-footer { padding: 20px; border-top: 1px solid #eee; }
  .cart-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .cart-footer input, .cart-footer textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; margin-bottom: 10px; font-family: inherit; outline: none; }
  .cart-footer input:focus, .cart-footer textarea:focus { border-color: #1c4587; }
  .cart-footer textarea { min-height: 60px; resize: none; }
  .submit-btn { width: 100%; background: #1c4587; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .submit-btn:hover { background: #163d7a; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* Модалка успех */
  .success-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 12px; padding: 32px; text-align: center; z-index: 300; box-shadow: 0 8px 32px rgba(0,0,0,0.2); max-width: 320px; width: 90%; }
  .success-modal.open { display: block; }
  .success-modal h3 { font-size: 18px; margin-bottom: 8px; color: #27ae60; }
  .success-modal p { font-size: 14px; color: #666; margin-bottom: 20px; }
  .success-modal button { background: #1c4587; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; }

  @media (max-width: 600px) {
    .cart-panel { width: 100%; }
    th:nth-child(1), td:nth-child(1) { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>IT-Trade — Прайс</h1>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Корзина <span class="badge" id="cart-badge">0</span>
  </button>
</header>

<div class="container">
  <div class="tabs" id="tabs"></div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Поиск по наименованию или артикулу..." oninput="renderTable()" />
  </div>
  <table>
    <thead>
      <tr>
        <th>Арт. поставщика</th>
        <th>Наименование</th>
        <th>Наличие</th>
        <th>Цена (RUB)</th>
        <th>Кол-во</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="product-body"></tbody>
  </table>
</div>

<!-- Корзина -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>Корзина</h2>
    <button class="cart-close" onclick="toggleCart()">×</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Итого позиций:</span><span id="cart-total-count">0</span></div>
    <input type="text" id="client-name" placeholder="Ваше имя *" />
    <input type="text" id="client-contact" placeholder="Телефон или Telegram *" />
    <textarea id="client-comment" placeholder="Комментарий к заказу"></textarea>
    <button class="submit-btn" onclick="submitOrder()">Отправить заявку</button>
  </div>
</div>

<!-- Успех -->
<div class="success-modal" id="success-modal">
  <h3>✓ Заявка отправлена!</h3>
  <p>Мы свяжемся с вами в ближайшее время.</p>
  <button onclick="closeSuccess()">Хорошо</button>
</div>

<script>
// ============================================================
//  ДАННЫЕ ПРАЙСА — обновляются автоматически из Google Sheets
// ============================================================
const PRODUCTS = {
  "Hikvision": [
    { art: "DS-2CD2143G2-I", name: "IP камера купольная 4Мп AcuSense", stars: "★★★", price: 4250 },
    { art: "DS-2CD2T47G2-L", name: "IP камера цилиндрическая 4Мп ColorVu", stars: "★★", price: 5100 },
    { art: "DS-7608NI-K2", name: "Видеорегистратор NVR 8 каналов", stars: "★", price: 18400 },
    { art: "DS-2DE4A425IWG-E", name: "PTZ камера 4Мп 25x зум", stars: "★★★", price: 32600 },
    { art: "DS-KV8113-WME1", name: "Вызывная панель домофона", stars: "★★", price: 7800 },
    { art: "DS-2CD2T85G1-I8", name: "IP камера цилиндрическая 8Мп", stars: "★", price: 9200 },
  ],
  "Slinex": [
    { art: "ML-20IP", name: "Вызывная IP панель 2Мп", stars: "★★★", price: 6300 },
    { art: "SQ-07MT", name: "Видеодомофон 7 дюймов сенсорный", stars: "★★", price: 9100 },
    { art: "VR-8IP", name: "Регистратор IP 8 каналов", stars: "★", price: 14200 },
    { art: "SM-07MHD", name: "Монитор видеодомофона 7 дюймов HD", stars: "★★★", price: 8400 },
  ],
  "iCont": [
    { art: "IC-HDB20F28", name: "HD камера 2Мп f2.8мм", stars: "★★★", price: 2900 },
    { art: "IC-NVR0401", name: "NVR 4 канала PoE", stars: "★★", price: 8600 },
    { art: "IC-PTZ3604", name: "PTZ камера 4Мп 36x зум", stars: "★", price: 21000 },
  ]
};

let currentBrand = "Hikvision";
let cart = {};

// Вкладки
const brands = Object.keys(PRODUCTS);
const tabsEl = document.getElementById("tabs");
brands.forEach(b => {
  const btn = document.createElement("button");
  btn.className = "tab" + (b === currentBrand ? " active" : "");
  btn.textContent = b;
  btn.onclick = () => {
    currentBrand = b;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    renderTable();
  };
  tabsEl.appendChild(btn);
});

function renderTable() {
  const search = document.getElementById("search").value.toLowerCase();
  const tbody  = document.getElementById("product-body");
  tbody.innerHTML = "";

  const items = (PRODUCTS[currentBrand] || []).filter(p =>
    p.name.toLowerCase().includes(search) || p.art.toLowerCase().includes(search)
  );

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:32px;">Ничего не найдено</td></tr>';
    return;
  }

  items.forEach((p, i) => {
    const key   = currentBrand + "_" + i;
    const added = !!cart[key];
    const tr    = document.createElement("tr");
    tr.innerHTML = `
      <td class="art">${p.art}</td>
      <td>${p.name}</td>
      <td><span class="stars">${p.stars}</span></td>
      <td class="price">${p.price.toLocaleString("ru")} ₽</td>
      <td>
        <div class="qty-wrap">
          <input class="qty-input" type="number" min="1" value="1" id="qty_${key}" />
        </div>
      </td>
      <td>
        <button class="add-btn ${added ? 'added' : ''}" id="btn_${key}" onclick="addToCart('${key}','${p.art.replace(/'/g,"\\'")}','${p.name.replace(/'/g,"\\'")}',${p.price})">
          ${added ? '✓ Добавлено' : 'В корзину'}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function addToCart(key, art, name, price) {
  const qtyEl = document.getElementById("qty_" + key);
  const qty   = parseInt(qtyEl ? qtyEl.value : 1) || 1;
  cart[key]   = { art, name, price, qty };
  const btn   = document.getElementById("btn_" + key);
  if (btn) { btn.className = "add-btn added"; btn.textContent = "✓ Добавлено"; }
  updateCartUI();
}

function removeFromCart(key) {
  delete cart[key];
  updateCartUI();
  renderCartItems();
  renderTable();
}

function updateCartUI() {
  const count = Object.keys(cart).length;
  document.getElementById("cart-badge").textContent = count;
  document.getElementById("cart-total-count").textContent = count;
}

function renderCartItems() {
  const el    = document.getElementById("cart-items");
  const items = Object.entries(cart);
  if (!items.length) {
    el.innerHTML = '<p class="cart-empty">Корзина пуста</p>';
    return;
  }
  el.innerHTML = items.map(([key, i]) => `
    <div class="cart-item">
      <div style="flex:1">
        <div class="cart-item-name">${i.name}</div>
        <div class="cart-item-art">${i.art}</div>
      </div>
      <div class="cart-item-right">
        <div class="cart-item-price">${(i.price * i.qty).toLocaleString("ru")} ₽</div>
        <div class="cart-item-qty">${i.qty} шт</div>
      </div>
      <button class="cart-remove" onclick="removeFromCart('${key}')">×</button>
    </div>
  `).join("");
}

function toggleCart() {
  const panel   = document.getElementById("cart-panel");
  const overlay = document.getElementById("cart-overlay");
  const isOpen  = panel.classList.contains("open");
  if (!isOpen) renderCartItems();
  panel.classList.toggle("open");
  overlay.classList.toggle("open");
}

function submitOrder() {
  const name    = document.getElementById("client-name").value.trim();
  const contact = document.getElementById("client-contact").value.trim();
  const comment = document.getElementById("client-comment").value.trim();
  const items   = Object.values(cart);

  if (!name)    { alert("Укажите ваше имя"); return; }
  if (!contact) { alert("Укажите телефон или Telegram"); return; }
  if (!items.length) { alert("Корзина пуста"); return; }

  // Формируем тело письма
  let body = "Новая заявка с прайса IT-Trade\n\n";
  body += "Клиент: " + name + "\n";
  body += "Контакт: " + contact + "\n";
  if (comment) body += "Комментарий: " + comment + "\n";
  body += "\nПозиции:\n";
  items.forEach(i => {
    body += "- " + i.art + " | " + i.name + " | " + i.qty + " шт | " + (i.price * i.qty).toLocaleString("ru") + " ₽\n";
  });

  // Ссылка mailto — откроет почтовый клиент
  const mailto = "mailto:info@it-trade.com.ru"
    + "?subject=" + encodeURIComponent("Заявка с прайса от " + name)
    + "&body=" + encodeURIComponent(body);

  window.location.href = mailto;

  // Показываем успех
  document.getElementById("cart-panel").classList.remove("open");
  document.getElementById("cart-overlay").classList.remove("open");
  document.getElementById("success-modal").classList.add("open");
  cart = {};
  updateCartUI();
}

function closeSuccess() {
  document.getElementById("success-modal").classList.remove("open");
  renderTable();
}

renderTable();
</script>
</body>
</html>
