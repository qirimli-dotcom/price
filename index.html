var brand = Object.keys(PRODUCTS)[0] || "";
var cart = {};

var tabsEl = document.getElementById("tabs");
Object.keys(PRODUCTS).forEach(function(b) {
  var btn = document.createElement("button");
  btn.className = "tab" + (b === brand ? " active" : "");
  btn.textContent = b;
  btn.addEventListener("click", function() {
    brand = b;
    document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
    btn.classList.add("active");
    renderTable();
  });
  tabsEl.appendChild(btn);
});

function renderTable() {
  var search = document.getElementById("search").value.toLowerCase();
  var tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  var items = (PRODUCTS[brand] || []).filter(function(p){
    return p.name.toLowerCase().indexOf(search) >= 0 || String(p.art).toLowerCase().indexOf(search) >= 0;
  });
  if (!items.length) {
    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;color:#aaa;padding:32px'>Ничего не найдено</td></tr>";
    return;
  }
  items.forEach(function(p, i) {
    var key = brand + "_" + PRODUCTS[brand].indexOf(p);
    var tr = document.createElement("tr");
    var tdNum = document.createElement("td"); tdNum.style.color="#aaa"; tdNum.style.fontSize="11px"; tdNum.textContent = i+1; tr.appendChild(tdNum);
    var td1 = document.createElement("td"); td1.className = "art"; td1.textContent = p.art; tr.appendChild(td1);
    var td2 = document.createElement("td"); td2.textContent = p.name; tr.appendChild(td2);
    var td3 = document.createElement("td"); td3.innerHTML = "<span class='stars'>" + p.stars + "</span>"; tr.appendChild(td3);
    var td4 = document.createElement("td"); td4.className = "price"; td4.textContent = p.noPrice ? "По запросу" : Math.round(p.price); tr.appendChild(td4);
    var td5 = document.createElement("td");
    var inp = document.createElement("input");
    inp.className = "qty-input"; inp.type = "number"; inp.min = "1"; inp.value = "1"; inp.id = "qty_" + key;
    td5.appendChild(inp); tr.appendChild(td5);
    var td6 = document.createElement("td");
    var btn = document.createElement("button");
    btn.className = "add-btn" + (cart[key] ? " added" : "");
    btn.id = "btn_" + key;
    btn.textContent = cart[key] ? "Добавлено" : "В корзину";
    (function(k, pp) {
      btn.addEventListener("click", function() {
        var qty = parseInt(document.getElementById("qty_" + k).value) || 1;
        cart[k] = { art: pp.art, name: pp.name, price: pp.price, qty: qty };
        var b2 = document.getElementById("btn_" + k);
        if (b2) { b2.className = "add-btn added"; b2.textContent = "Добавлено"; }
        updateCartUI();
      });
    })(key, p);
    td6.appendChild(btn); tr.appendChild(td6);
    tbody.appendChild(tr);
  });
}

function updateCartUI() {
  var c = Object.keys(cart).length;
  document.getElementById("cart-badge").textContent = c;
  document.getElementById("cart-count").textContent = c;
}

function renderCartItems() {
  var el = document.getElementById("cart-items");
  var items = Object.entries(cart);
  if (!items.length) { el.innerHTML = "<p class='cart-empty'>Корзина пуста</p>"; return; }
  el.innerHTML = items.map(function(e) {
    var k = e[0], it = e[1];
    return "<div class='cart-item'>" +
      "<div style='flex:1'><div class='cart-item-name'>" + it.name + "</div><div class='cart-item-art'>" + it.art + "</div></div>" +
      "<div style='text-align:right;flex-shrink:0'><div class='cart-item-price'>" + Math.round(it.price * it.qty) + "</div><div class='cart-item-qty'>" + it.qty + " шт</div></div>" +
      "<button class='cart-remove' data-key='" + k + "'>&#215;</button>" +
      "</div>";
  }).join("");
  el.querySelectorAll(".cart-remove").forEach(function(btn) {
    btn.addEventListener("click", function() { removeFromCart(btn.getAttribute("data-key")); });
  });
}

function removeFromCart(k) { delete cart[k]; updateCartUI(); renderCartItems(); renderTable(); }

function toggleCart() {
  var p = document.getElementById("cart-panel");
  var o = document.getElementById("cart-overlay");
  if (!p.classList.contains("open")) renderCartItems();
  p.classList.toggle("open");
  o.classList.toggle("open");
}

function submitOrder() {
  var name = document.getElementById("c-name").value.trim();
  var contact = document.getElementById("c-contact").value.trim();
  var comment = document.getElementById("c-comment").value.trim();
  var items = Object.values(cart);
  if (!name) { alert("Укажите ваше имя"); return; }
  if (!contact) { alert("Укажите телефон или Telegram"); return; }
  if (!items.length) { alert("Корзина пуста"); return; }
  var order = "";
  items.forEach(function(i) { order += i.art + " | " + i.name + " | " + i.qty + " шт | " + Math.round(i.price * i.qty) + " руб.\n"; });
  emailjs.send("service_v8tafrn", "template_yzytwbd", {
    from_name: name,
    contact: contact,
    comment: comment || "-",
    order: order
  }).then(function() {
    document.getElementById("cart-panel").classList.remove("open");
    document.getElementById("cart-overlay").classList.remove("open");
    document.getElementById("success-modal").classList.add("open");
    cart = {}; updateCartUI();
  }, function(error) {
    alert("Ошибка отправки: " + JSON.stringify(error));
  });
}

renderTable();
</script>
